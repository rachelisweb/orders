<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס הזמנה רחליס</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Assistant', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        .header { background: var(--primary); color: white; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .cart-btn { position: relative; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
        .cart-badge { position: absolute; top: -6px; right: -6px; background: var(--danger); color: white; border-radius: 999px; min-width: 20px; height: 20px; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary); }
        .cart-badge.hidden { display: none; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
        .form-group input, .search-box { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 10px; background: #fcfcfc; font-size: 14px; }
        .form-group input:focus, .search-box:focus { outline: none; border-color: var(--accent); }
        .search-box { margin-bottom: 1.5rem; }
        
        /* עיצוב הלשוניות העליונות */
        .tabs-container { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        .tab-btn { flex: 1; padding: 12px 16px; background: none; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all 0.2s ease; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25); }
        .tab-btn:hover:not(.active) { background: #f1f5f9; color: var(--text-main); }

        .product-card { border: 1px solid var(--border); border-radius: 14px; margin-bottom: 1rem; background: white; display: flex; overflow: hidden; }
        .product-image { width: 110px; min-width: 110px; background: #f1f5f9; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .zoom-icon { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.45); border-radius: 4px; padding: 3px 6px; color: white; font-size: 12px; }
        .product-body { padding: 1rem; flex: 1; }
        .product-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .btn-serie { background: #f1f5f9; border: 1px solid var(--border); color: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
        .sizes-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .size-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .size-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); }
        .size-input { width: 48px; height: 36px; text-align: center; border: 2px solid var(--border); border-radius: 8px; font-weight: 700; font-size: 14px; }
        .size-input.has-value { border-color: var(--success); background: #ecfdf5; color: var(--success); }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 999; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 14px; padding: 14px; max-width: 420px; width: 90%; position: relative; }
        .modal-box img { width: 100%; border-radius: 10px; object-fit: contain; max-height: 500px; }
        .modal-close { position: absolute; top: 10px; left: 10px; width: 30px; height: 30px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; border: none; }
        
        .cart-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(4px); z-index: 998; }
        .cart-overlay.active { display: flex; }
        .cart-panel { background: white; width: 400px; max-width: 100vw; height: 100vh; position: absolute; left: 0; padding: 1.5rem; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto; }
        .cart-items-container { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
        
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 0.75rem; background: #f8fafc; }
        .cart-item-image { width: 50px; height: 50px; min-width: 50px; border-radius: 8px; overflow: hidden; background: #f1f5f9; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .cart-item-image img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
        .btn-remove { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.15rem; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .btn-remove:hover { background: #fee2e2; }
        
        .cart-size-tag { display: inline-block; background: white; border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; margin: 2px; }
        .cart-footer-fixed { border-top: 1px solid var(--border); padding-top: 1rem; flex-shrink: 0; }
        .btn-submit { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .cart-panel { width: 100vw; } }
    </style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img id="modalImg" src="" alt="">
        <div id="modalTitle" style="text-align:center; font-weight:700; margin-top:10px;"></div>
    </div>
</div>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()">
    <div class="cart-panel" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:1rem; flex-shrink:0;">
            <h3>🛒 סל ההזמנה המאוחד</h3>
            <button onclick="closeCart()" style="border:none; background:none; cursor:pointer; font-size:1.2rem;">✕</button>
        </div>
        <div class="cart-items-container" id="cartItems"></div>
        <div class="cart-footer-fixed" id="cartFooter" style="display:none;">
            <div id="cartTotal" style="font-size:1.1rem; font-weight:800; margin-bottom:1rem;"></div>
            <div id="cartErrorMsg" class="error-msg" style="display:none;"></div>
            <button class="btn-submit" id="submitBtn" onclick="submitOrder()">שלח הזמנה עכשיו</button>
        </div>
    </div>
</div>

<div class="header">
    <h1>🛍️ טופס הזמנה רחליס</h1>
    <button class="cart-btn" onclick="openCart()">
        🛒
        <div class="cart-badge hidden" id="cartBadge">0</div>
    </button>
</div>

<div class="container">
    <div id="loadingDiv" class="card loading">
        <div class="spinner"></div>
        <p>טוען נתונים מהמערכת...</p>
    </div>

    <div id="mainForm" style="display:none">
        <div class="card">
            <h2>👤 פרטי הלקוח</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>שם מלא *</label>
                    <input type="text" id="customerName" placeholder="הכנס שם מלא">
                </div>
                <div class="form-group">
                    <label>טלפון *</label>
                    <input type="tel" id="customerPhone" placeholder="050-0000000">
                </div>
            </div>
            <div class="form-group">
                <label>אימייל *</label>
                <input type="email" id="customerEmail" placeholder="email@example.com">
            </div>
        </div>
        
        <div class="card">
            <h2>📦 בחירת דגמים</h2>
            
            <!-- לשוניות מעבר קולקציה -->
            <div class="tabs-container">
                <button class="tab-btn active" id="tab-summer" onclick="switchTab('summer')">☀️ קולקציית קיץ</button>
                <button class="tab-btn" id="tab-winter" onclick="switchTab('winter')">❄️ קולקציית חורף 26</button>
            </div>
            
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 חפש דגם..." oninput="filterProducts(this.value)">
            <div id="productsContainer"></div>
        </div>
    </div>

    <div id="successDiv" style="display:none" class="card">
        <div style="text-align:center; padding:2rem;">
            <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
            <h2 style="border:none; margin-bottom:0.5rem;">ההזמנה נשלחה בהצלחה!</h2>
            <p style="color:var(--text-muted);">ניצור איתך קשר בהקדם לתיאום אספקה.</p>
        </div>
    </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZHL7AdBibVRxWpTBI4um9MJ79VDx0ZgAWuSlavx9PLD4n9eXe8ll9eHu0235XasHW/exec';

const TABS = {
    summer: 'קולקציית קיץ',
    winter: 'קולקציית חורף 26'
};

// הוספת מידת XS למערך המידות הגלובלי באפליקציה
const sizeOrder = ["XS","S","M","L","XL","XXL","3XL","4XL","5XL"];

let currentTab = 'summer';       
let tabCache = {};               
let allProducts = {};            
let currentTabProducts = [];     
let cartState = {};              // { [model]: { sizes: { [size]: qty }, sheetName: "..." } }

window.onload = function() {
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('mainForm').style.display = 'block';
    loadTabProducts('summer');
};

function loadTabProducts(tabKey) {
    const container = document.getElementById('productsContainer');
    
    if (tabCache[tabKey]) {
        currentTabProducts = tabCache[tabKey];
        renderProducts();
        return;
    }
    
    container.innerHTML = `
        <div style="text-align: center; padding: 3rem;">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 10px;">טוען מוצרים מ${TABS[tabKey]}...</p>
        </div>
    `;
    
    const sheetName = TABS[tabKey];
    fetch(`${APPS_SCRIPT_URL}?action=getProducts&sheetName=${encodeURIComponent(sheetName)}`)
        .then(r => r.json())
        .then(data => {
            tabCache[tabKey] = data;
            
            data.forEach(p => {
                allProducts[p.model] = p; // שומר את האובייקט המלא כולל ה-sheetName שלו
            });
            
            if (currentTab === tabKey) {
                currentTabProducts = data;
                renderProducts();
            }
        })
        .catch(err => {
            container.innerHTML = `
                <div style="text-align: center; padding: 2rem; color: var(--danger);">
                    שגיאה בטעינת קולקציה: ${err.message}
                    <br><button onclick="loadTabProducts('${tabKey}')" class="btn-serie" style="margin-top: 15px;">נסה שוב 🔄</button>
                </div>
            `;
        });
}

function switchTab(tabKey) {
    if (currentTab === tabKey) return;
    
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`tab-${tabKey}`).classList.add('active');
    
    currentTab = tabKey;
    document.getElementById('searchInput').value = '';
    loadTabProducts(tabKey);
}

function renderProducts() {
    const container = document.getElementById('productsContainer');
    if (!currentTabProducts.length) { 
        container.innerHTML = '<p style="text-align:center;color:#999;padding:2rem;">אין דגמים זמינים כרגע בקולקציה זו</p>'; 
        return; 
    }
    
    container.innerHTML = currentTabProducts.map(p => {
        // מסנן החוצה מידות שאין להן הגדרת מלאי (זה יעלים את XS ממוצרי הקיץ ויציג אותו רק בחורף)
        const sortedSizes = sizeOrder.filter(s => p.stock[s] !== undefined);
        return `
        <div class="product-card" data-model="${p.model}">
            <div class="product-image" onclick="openModal('${p.image || ''}', 'דגם ${p.model}')">
                ${p.image ? `<img src="${p.image}" alt="דגם ${p.model}"><div class="zoom-icon">🔍</div>` : `<span style="font-size:2rem;color:#ccc;">📷</span>`}
            </div>
            <div class="product-body">
                <div class="product-header">
                    <div style="font-weight:700;">דגם ${p.model}</div>
                    <button class="btn-serie" onclick="addSerie('${p.model}')">📦 הוסף סריה</button>
                </div>
                <div class="sizes-grid">
                    ${sortedSizes.map(size => {
                        const currentVal = (cartState[p.model] && cartState[p.model].sizes[size]) ? cartState[p.model].sizes[size] : 0;
                        const hasValClass = currentVal > 0 ? 'has-value' : '';
                        return `
                        <div class="size-item">
                            <span class="size-label">${size}</span>
                            <input class="size-input ${hasValClass}" type="number" min="0" max="${p.stock[size]}" value="${currentVal}"
                                id="size_${p.model}_${size}"
                                oninput="validateAndSetInput(this, ${p.stock[size]}, '${p.model}', '${size}')">
                        </div>
                        `;
                    }).join('')}
                </div>
            </div>
        </div>`;
    }).join('');
}

function validateAndSetInput(input, max, modelId, size) {
    let val = parseInt(input.value) || 0;
    if (val < 0) val = 0;
    if (val > max) val = max;
    
    input.value = val;
    input.classList.toggle('has-value', val > 0);
    
    if (!cartState[modelId]) {
        const p = allProducts[modelId];
        cartState[modelId] = {
            sizes: {},
            sheetName: p && p.sheetName ? p.sheetName : (currentTab === 'summer' ? 'קולקציית קיץ' : 'קולקציית חורף 26')
        };
    }
    
    cartState[modelId].sizes[size] = val;
    
    if (val === 0) {
        delete cartState[modelId].sizes[size];
        if (Object.keys(cartState[modelId].sizes).length === 0) {
            delete cartState[modelId];
        }
    }
    updateCartCount();
}

function openModal(imgUrl, title) {
    if (!imgUrl) return;
    document.getElementById('modalImg').src = imgUrl;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.getElementById('modalImg').src = '';
}

function addSerie(modelId) {
    const product = allProducts[modelId];
    if (!product) return;
    
    if (!cartState[modelId]) {
        cartState[modelId] = {
            sizes: {},
            sheetName: product.sheetName || (currentTab === 'summer' ? 'קולקציית קיץ' : 'קולקציית חורף 26')
        };
    }
    
    Object.keys(product.stock).forEach(size => {
        let currentVal = cartState[modelId].sizes[size] || 0;
        if (currentVal < product.stock[size]) {
            cartState[modelId].sizes[size] = currentVal + 1;
        }
    });
    
    renderProducts(); 
    updateCartCount();
}

function removeModelFromCart(modelId) {
    delete cartState[modelId];
    renderProducts(); 
    updateCartCount();
    updateCartPanel();
}

function clearCart() {
    cartState = {};
    renderProducts();
    updateCartCount();
    updateCartPanel();
}

function updateCartCount() {
    let total = 0;
    Object.values(cartState).forEach(item => {
        Object.values(item.sizes).forEach(qty => {
            total += qty;
        });
    });
    
    const badge = document.getElementById('cartBadge');
    badge.textContent = total;
    badge.classList.toggle('hidden', total === 0);
}

function openCart() { updateCartPanel(); document.getElementById('cartOverlay').classList.add('active'); }
function closeCart() { document.getElementById('cartOverlay').classList.remove('active'); }

function updateCartPanel() {
    const container = document.getElementById('cartItems');
    const footer = document.getElementById('cartFooter');
    const totalEl = document.getElementById('cartTotal');
    let html = '', totalQty = 0;
    
    Object.keys(cartState).forEach(modelId => {
        const p = allProducts[modelId];
        if (!p) return;
        
        let pQty = 0, sizesHtml = '';
        const sortedSizes = sizeOrder.filter(s => cartState[modelId].sizes[s] !== undefined);
        
        sortedSizes.forEach(s => {
            const val = cartState[modelId].sizes[s] || 0;
            if (val > 0) {
                pQty += val;
                sizesHtml += `<span class="cart-size-tag">${s}: ${val}</span>`;
            }
        });
        
        if (pQty > 0) {
            totalQty += pQty;
            html += `
            <div class="cart-item">
                <div class="cart-item-image">
                    ${p.image ? `<img src="${p.image}" alt="דגם ${p.model}">` : `<span style="font-size:1.2rem;color:#ccc;">📷</span>`}
                </div>
                <div class="cart-item-info">
                    <div class="cart-item-title">דגם ${p.model}</div>
                    <div style="color:var(--text-muted); font-size:0.75rem; margin-bottom:4px;">מקור: ${cartState[modelId].sheetName}</div>
                    <div style="display:flex; flex-wrap:wrap; gap:2px;">${sizesHtml}</div>
                </div>
                <button class="btn-remove" onclick="removeModelFromCart('${p.model}')" title="הסר פריט">🗑️</button>
            </div>`;
        }
    });
    
    if (totalQty === 0) { 
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:2rem;">הסל שלך ריק...</p>'; 
        footer.style.display = 'none'; 
    } else { 
        container.innerHTML = html; 
        totalEl.textContent = `סה"כ פריטים בסל: ${totalQty}`; 
        footer.style.display = 'block'; 
    }
}

function filterProducts(q) {
    const query = q.toLowerCase().trim();
    document.querySelectorAll('.product-card').forEach(c => {
        c.style.display = c.getAttribute('data-model').toLowerCase().includes(query) ? 'flex' : 'none';
    });
}

function submitOrder() {
    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    const email = document.getElementById('customerEmail').value.trim();
    const errEl = document.getElementById('cartErrorMsg');
    errEl.style.display = 'none';

    if (!name || !phone || !email) {
        errEl.textContent = 'אנא מלא את כל פרטי הלקוח בטופס';
        errEl.style.display = 'block';
        return;
    }

    const orderItems = [];
    Object.keys(cartState).forEach(modelId => {
        orderItems.push({
            model: modelId,
            sizes: { ...cartState[modelId].sizes },
            sheetName: cartState[modelId].sheetName
        });
    });

    if (!orderItems.length) {
        errEl.textContent = 'אנא בחר לפחות דגם אחד';
        errEl.style.display = 'block';
        return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'שולח...';

    fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ 
            action: 'submitOrder', 
            customerName: name, 
            customerPhone: phone, 
            customerEmail: email, 
            orderItems 
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            closeCart();        
            clearCart();        
            document.getElementById('mainForm').style.display = 'none';
            document.getElementById('successDiv').style.display = 'block';
        } else {
            errEl.textContent = data.error || 'שגיאה בשליחה';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'שלח הזמנה עכשיו';
        }
    })
    .catch(err => {
        errEl.textContent = 'שגיאה: ' + err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'שלח הזמנה עכשיו';
    });
}
</script>
</body>
</html>
